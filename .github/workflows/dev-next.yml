name: "2. Build dev-next Images && Pull Release"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1. Build Latest Images && Pull Release"]
    branches: [main]
    types:
      - completed

jobs:
  Building:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}
      workdir: sing-box-source

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check the dev-next verion
        run: |
          [ -e README.md ] && NOW=$(awk '/^ - ### \*\*dev-next\*\*:/{print $NF}' README.md)
          LATEST=$(wget -qO- "https://api.github.com/repos/SagerNet/sing-box/releases" | awk -F '["]' '/tag_name.*-/{print $4;exit}')
          echo " NOW: $NOW"
          echo " LATEST: $LATEST"
          if [ "$NOW" != "$LATEST" ]; then
            sed -i "/^ - ### \*\*dev-next\*\*:/s/\(.*: \).*/\1$LATEST/" README.md
            echo "VERSION=$LATEST" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        if: ${{ env.VERSION != '' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ env.VERSION != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.VERSION != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push images to Docker hub
        if: ${{ env.VERSION != '' }}
        uses: docker/build-push-action@v5
        with:
          push: true
          file: dev-next/Dockerfile
          platforms: linux/amd64, linux/arm64, linux/arm/v7
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:dev-next
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}

      - name: Upload to repository
        if: ${{ env.VERSION != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build ${{ env.VERSION }} by Github Actions, ${{ env.DATE }}

      # -

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git clone sing-box
        run: |
          git clone -b "${{ env.VERSION }}" https://github.com/SagerNet/sing-box.git ${{ env.workdir }}
          cp .github/sing-box.yml ${{ env.workdir }}/.goreleaser.yml
          sed -i 's/ChangeSingBoxVersion/${{ env.VERSION }}/g' ${{ env.workdir }}/.goreleaser.yml

      - name: Set up GoReleaser
        if: ${{ env.VERSION != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run GoReleaser
        if: ${{ env.VERSION != '' }}
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ env.workdir }}
          args: --auto-snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release binaries
        if: ${{ env.VERSION != '' }}
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: true
          files: ${{ env.workdir }}/dist/*.tar.gz
