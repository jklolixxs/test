name: "3. Build Latest Release & Pull"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["2. Build dev-next Images"]
    branches: [main]
    types:
      - completed

jobs:
  Building:
    name: Build Release
    runs-on: ubuntu-latest
    env:
      workdir: sing-box-source

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git clone sing-box
        run: |
          [ -e README.md ] && OLD=$(awk '/^ - ### \*\*latest\*\*:/{print $NF}' README.md)
          NEW=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          sed -i '/^ - ### \*\*latest\*\*:/s/\(.*: \).*/\1$NEW/' README.md
          git clone -b '$NEW' https://github.com/SagerNet/sing-box.git ${{ env.workdir }}
          cp .github/sing-box.yml ${{ env.workdir }}/.goreleaser.yml
          sed -i 's/ChangeSingBoxVersion/$NEW/g' ${{ env.workdir }}/.goreleaser.yml
          if [ "$OLD" != "$NEW" ]; then
            echo "VERSION=$NEW" >> $GITHUB_ENV
          fi

      - name: Set up GoReleaser
        if: ${{ env.VERSION != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run GoReleaser
        if: ${{ env.VERSION != '' }}
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          workdir: ${{ env.workdir }}
          args: --auto-snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release binaries
        if: ${{ env.VERSION != '' }}
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: false
          files: ${{ env.workdir }}/dist/*.tar.gz
