name: "2. Build dev-next Images"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1. Build Latest Images"]
    branches: [main]
    types:
      - completed

jobs:
  Building:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check the dev-next verion
        run: |
          [ -e README.md ] && NOW=$(awk '/^ - ### \*\*dev-next\*\*:/{print $NF}' README.md)
          LATEST=$(wget -qO- "https://api.github.com/repos/SagerNet/sing-box/releases" | awk -F '["]' '/tag_name.*-/{print $4;exit}')
          echo " NOW: $NOW"
          echo " LATEST: $LATEST"
          if [ "$NOW" != "$LATEST" ]; then
            echo "VERSION=$LATEST" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        if: ${{ env.VERSION != '' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ env.VERSION != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.VERSION != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push images to Docker hub
        if: ${{ env.VERSION != '' }}
        uses: docker/build-push-action@v5
        with:
          push: true
          file: dev-next/Dockerfile
          platforms: linux/amd64, linux/arm64, linux/arm/v7
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:dev-next
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}

      - name: Upload to repository
        if: ${{ env.VERSION != '' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build ${{ env.VERSION }} by Github Actions, ${{ env.DATE }}
