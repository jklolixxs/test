name: "2. Build Latest Images && Pull"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1. Build Latest Release && Pull"]
    branches: [main]
    types:
      - completed

jobs:
  Building:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check the latest verion
        run: |
          [ -e README.md ] && OLD=$(awk '/^ - ### \*\*latest\*\*:/{print $NF}' README.md)
          NEW=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo " OLD: $OLD"
          echo " NEW: $NEW"
          if [ "$OLD" != "$NEW" ]; then
            sed -i "/^ - ### \*\*latest\*\*:/s/\(.*: \).*/\1$NEW/" README.md
            echo "VERSION=$NEW" >> $GITHUB_ENV
            export RUN_NEXT_STEPS=true
          else
            export RUN_NEXT_STEPS=false
          fi

      - name: Set up QEMU
        if: env.RUN_NEXT_STEPS
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.RUN_NEXT_STEPS
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: env.RUN_NEXT_STEPS
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push images to Docker hub
        if: env.RUN_NEXT_STEPS
        uses: docker/build-push-action@v5
        with:
          push: true
          file: main/Dockerfile
          platforms: linux/amd64, linux/arm64, linux/arm/v7
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:latest
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.VERSION }}

      - name: Upload to repository
        if: env.RUN_NEXT_STEPS
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build ${{ env.VERSION }} by Github Actions, ${{ env.DATE }}
