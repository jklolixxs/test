name: "1. Build Latest Release && Pull"

on:
  workflow_dispatch:
  schedule:
    - cron: 0 */1 * * *

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      BINARY: sing-box

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm, arm64]
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: "arm"
            goos: darwin
          - goarch: "arm64"
            goos: darwin
          - goarch: "386"
            goos: windows
          - goarch: arm
            goos: windows
          - goarch: arm64
            goos: windows

    steps:
      - name: Checkout My Repositories
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git clone sing-box
        run: |
          GOVERSION=$(curl -s https://go.dev/VERSION?m=text | grep -oP 'go\K\d+(\.\d+)+')
          echo "GOVERSION=$GOVERSION" >> $GITHUB_ENV
          [ -e README.md ] && OLD=$(awk '/^\s+- ### \*\*latest\*\*:/ {print $NF}' README.md)
          NEW=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo " OLD: $OLD"
          echo " NEW: $NEW"
          echo "VERSION=$NEW" >> $GITHUB_ENV
          if [ "$OLD" != "$NEW" ]; then
            echo "RUN_NEXT_STEPS=true" >> $GITHUB_ENV
          else
            echo "RUN_NEXT_STEPS=false" >> $GITHUB_ENV
          fi

      - name: Checkout My Repositories
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag exists
        run: |
          TAG_NAME=${{ env.VERSION }}
          TAG_EXISTS=$(curl -s https://api.github.com/repos/jklolixxs/test/releases/tags/$TAG_NAME | jq -r '.tag_name')
          echo "TAG_EXISTS: $TAG_EXISTS"
          if [ $TAG_EXISTS == null ]; then
            echo "RUN_RELEASE=true" >> $GITHUB_ENV
          else
            echo "RUN_RELEASE=false" >> $GITHUB_ENV
          fi
          echo "RUN_RELEASE: $RUN_RELEASE"

      - name: Release binaries
        if: env.RUN_RELEASE
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: false

      - name: Git clone repository
        if: env.RUN_NEXT_STEPS
        uses: actions/checkout@v4
        with:
          repository: "SagerNet/sing-box"
          ref: "${{ env.VERSION }}"
          fetch-depth: 1

      - uses: wangyoucao577/go-release-action@v1.41
        if: env.RUN_NEXT_STEPS
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 你的 GITHUB_TOKEN 用于将版本上传到 Github Release。
          goos: ${{ matrix.goos }} # 运行程序的操作系统
          goarch: ${{ matrix.goarch }} # 运行程序的架构
          goversion: ${{ env.GOVERSION }} # Go 编译环境版本
          project_path: "./cmd/sing-box" # 在哪里运行 go build 命令。
          binary_name: "${{ env.BINARY }}" # 二进制名称
          build_flags: "-trimpath -tags with_quic,with_grpc,with_dhcp,with_wireguard,with_ech,with_utls,with_reality_server,with_acme,with_clash_api,with_gvisor" # 传递给 go build 命令的其他参数
          ldflags: -s -w --extldflags '-static -fpic' -X github.com/sagernet/sing-box/constant.Version=${{ ENV.VERSION }} # ldflags参数
          md5sum: "false"
          release_tag: "${{ env.VERSION }}" # 上传的标签
          release_name: "${{ env.VERSION }}" # 上传的名字
          compress_assets: "auto" # 自定义打包
          overwrite: true # 覆盖
          asset_name: "${{ env.BINARY }}-${{ matrix.goos }}-${{ matrix.goarch }}" # 自定义名称

      - name: Delete old workflow runs
        if: env.RUN_NEXT_STEPS
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 3600
